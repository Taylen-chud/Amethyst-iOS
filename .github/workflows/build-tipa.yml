name: Build TIPA (TrollStore)

on:
  workflow_dispatch:

jobs:
  build-tipa:
    name: Build TrollStore .tipa
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up environment
        run: |
          export PATH=/usr/local/bin:$PATH
          echo "RUNNER=1" >> $GITHUB_ENV

      - name: Install JDK 8 (Zulu)
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '8'

      - name: Export Java env
        run: |
          JDK_BASE_PATH="${{ steps.setup-java.outputs.path }}"
          echo "JAVA_HOME=$JDK_BASE_PATH" >> $GITHUB_ENV
          echo "BOOTJDK=$JDK_BASE_PATH/bin" >> $GITHUB_ENV
          echo "PATH=$JDK_BASE_PATH/bin:$PATH" >> $GITHUB_ENV

      - name: Get JRE8 from CDN
        continue-on-error: true
        run: |
          mkdir -p depends
          echo "Downloading JRE8 from CDN..."
          curl -L --fail -o /tmp/jre8.zip https://crystall1ne.dev/cdn/amethyst-ios/jre8-ios-aarch64.zip || true
          if [ -f /tmp/jre8.zip ]; then
            unzip -q /tmp/jre8.zip -d depends || true
            rm -f /tmp/jre8.zip
          else
            echo "JRE8 not available on CDN; continuing.";
          fi

      - name: Get JRE17 from CDN
        continue-on-error: true
        run: |
          mkdir -p depends
          echo "Downloading JRE17 from CDN..."
          curl -L --fail -o /tmp/jre17.zip https://crystall1ne.dev/cdn/amethyst-ios/jre17-ios-aarch64.zip || true
          if [ -f /tmp/jre17.zip ]; then
            unzip -q /tmp/jre17.zip -d depends || true
            rm -f /tmp/jre17.zip
          else
            echo "JRE17 not available on CDN; continuing.";
          fi

      - name: Get JRE21 from CDN
        continue-on-error: true
        run: |
          mkdir -p depends
          echo "Downloading JRE21 from CDN..."
          curl -L --fail -o /tmp/jre21.zip https://crystall1ne.dev/cdn/amethyst-ios/jre21-ios-aarch64.zip || true
          if [ -f /tmp/jre21.zip ]; then
            unzip -q /tmp/jre21.zip -d depends || true
            rm -f /tmp/jre21.zip
          else
            echo "JRE21 not available on CDN; continuing.";
          fi

      - name: Get JRE25 from release (Taylen-chud)
        continue-on-error: true
        run: |
          mkdir -p depends
          echo "Downloading JRE25 release from Taylen-chud..."
          curl -L --fail -o /tmp/jre25.tar.xz https://github.com/Taylen-chud/Amethyst-iOS/releases/download/Jre25/jre25-ios-arm64-20260618-release.tar.xz || true
          if [ -f /tmp/jre25.tar.xz ]; then
            mkdir -p depends/java-25-openjdk
            tar xf /tmp/jre25.tar.xz -C depends/java-25-openjdk || true
            rm -f /tmp/jre25.tar.xz
          else
            echo "JRE25 release not downloaded; continuing (CDN fallback may apply).";
          fi

      

      - name: "Fallback: download JRE zips from CDN"
        run: |
          mkdir -p depends
          echo "Attempting CDN downloads for JREs (non-fatal)"
          curl -L --fail -o depends/jre8-ios-aarch64.zip https://crystall1ne.dev/cdn/amethyst-ios/jre8-ios-aarch64.zip || true
          curl -L --fail -o depends/jre17-ios-aarch64.zip https://crystall1ne.dev/cdn/amethyst-ios/jre17-ios-aarch64.zip || true
          curl -L --fail -o depends/jre21-ios-aarch64.zip https://crystall1ne.dev/cdn/amethyst-ios/jre21-ios-aarch64.zip || true
          curl -L --fail -o depends/jre25-ios-arm64.tar.xz https://github.com/Taylen-chud/Amethyst-iOS/releases/download/Jre25/jre25-ios-arm64-20260618-release.tar.xz || true

      - name: Install dependencies
        run: |
          brew update || true
          brew install ldid wget make || true
          sudo mkdir -p /usr/local/bin
          sudo ln -s /opt/homebrew/bin/gmake /usr/local/bin/gmake || true

      - name: Build .tipa
        run: |
          set -e
          make dsym package PLATFORM=2 TROLLSTORE_JIT_ENT=1

      - name: Upload tipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-trollstore-tipa
          path: artifacts/*.tipa
