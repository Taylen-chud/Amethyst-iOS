name: Development build

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  build:
    name: Development build

    runs-on: macos-latest
    steps:
      - name: Install dependencies
        run: brew install temurin@8 ldid make
          
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout repository submodules
        run: git submodule update --init --recursive

      - name: Build
        run: |
          export PATH=/opt/procursus/bin:/opt/homebrew/bin:$PATH
          export SLIMMED=1
          gmake -j$(sysctl -n hw.ncpu) package
          gmake -j$(sysctl -n hw.ncpu) package TROLLSTORE_JIT_ENT=1

      - name: Upload regular ipa
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst.ipa
          path: artifacts/org.angelauramc.amethyst-*.ipa


      - name: Upload slimmed ipa
        uses: actions/upload-artifact@v4
        with:
          name: Amethyst slimmed
          path: artifacts/org.angelauraamethyst.slimmed-*.ipa


      - name: Upload jre
        uses: actions/upload-artifact@v4
        with:
          name: java_runtimes
          path: artifacts/java_runtimes/*
