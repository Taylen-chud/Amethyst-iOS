name: Build Amethyst iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14 # Uses a modern macOS environment with Xcode installed

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive # Automatically pulls in any linked submodules if present

    - name: Set up Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Cache Build Dependencies
      uses: actions/cache@v4
      with:
        path: ~/Library/Developer/Xcode/DerivedData
        key: ${{ runner.os }}-xcode-${{ hashFiles('**/*.xcodeproj') }}

    - name: Build Xcode Project (Simulator/Generic iOS Device)
      run: |
        xcodebuild -project Amethyst.xcodeproj \
                   -scheme Amethyst \
                   -configuration Release \
                   -sdk iphoneos \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   clean build

    - name: Package App into IPA
      run: |
        mkdir -p Payload
        # Moves the compiled app bundle into the Payload folder
        cp -r ~/Library/Developer/Xcode/DerivedData/Amethyst-*/Build/Products/Release-iphoneos/Amethyst.app Payload/
        # Zips it up into an IPA package
        zip -r Amethyst.ipa Payload

    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: Amethyst-iOS-Build
        path: Amethyst.ipa
