name: Build iOS JDK 25

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - name: Checkout openjdk-build (PR branch)
        uses: actions/checkout@v4
        with:
          repository: taylenwells2026-blip/angelauramc-openjdk-build
          ref: PR
          path: openjdk-build

      - name: Setup boot JDK (Temurin 25)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Install build deps
        run: |
          brew update
          brew install autoconf fontconfig ldid xquartz make wget
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-path
          xcrun --sdk iphoneos --show-sdk-version

      - name: Make scripts executable
        working-directory: openjdk-build
        run: |
          chmod +x ios-arm64-clang ios-arm64-clang++ macos-host-cc
          chmod +x *.sh

      - name: Build iOS JDK 25
        working-directory: openjdk-build
        env:
          BUILD_IOS: '1'
          TARGET_VERSION: '25'
          NDK_VERSION: r27c
        shell: bash
        run: |
          set -o pipefail
          export TARGET=aarch64-apple-ios
          export TARGET_JDK=aarch64
          bash 2_ci_build_global.sh 2>&1 | tee build.log

      - name: Show last 200 lines of build log
        if: always()
        working-directory: openjdk-build
        run: tail -200 build.log 2>/dev/null || true

      - name: Find built JRE
        if: always()
        working-directory: openjdk-build
        run: find . -name "libjvm.dylib" -type f 2>/dev/null | head -5

      - name: Upload built JRE if successful
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: jre25-ios-aarch64
          path: openjdk-build/**/*.tar.xz
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: openjdk-build/build.log
          if-no-files-found: ignore
